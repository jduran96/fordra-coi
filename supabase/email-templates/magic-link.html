<!-- Supabase Auth email template: Magic Link.
     Paste into Dashboard -> Authentication -> Emails -> Magic Link, then Save
     ON THAT TAB and reload to confirm it stuck.
     Uses the token_hash link format (see app/auth/callback/route.ts).
     Hardening notes (learned 2026-07-08 from a Gmail-mangled send):
     - No quoted font names ('Segoe UI') and no long attribute values: the send
       pipeline hard-wraps long lines, and a newline inside a quoted CSS string
       is invalid CSS that makes Gmail drop the styles (collapsed button).
     - Button sizing lives on the td, not the anchor: td padding survives
       aggressive sanitizers. -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#faf9f5;padding:40px 16px;">
  <tr>
    <td align="center">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#ffffff;border:1px solid #e5e4e0;border-radius:16px;">
        <tr>
          <td style="padding:40px 40px 36px;">
            <p style="margin:0 0 28px;font-family:Georgia,serif;font-size:26px;color:#141413;">Fordra</p>
            <p style="margin:0 0 8px;font-family:Georgia,serif;font-size:22px;color:#141413;">Your Sign in Link</p>
            <p style="margin:0 0 28px;font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:22px;color:#57544e;">
              This link expires in 1 hour and can only be used once.
            </p>
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td align="center" bgcolor="#d4fd8e" style="border-radius:9999px;padding:13px 28px;">
                  <a href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=magiclink" target="_blank" style="display:inline-block;font-family:Arial,Helvetica,sans-serif;font-size:15px;font-weight:bold;line-height:15px;color:#141413;text-decoration:none;">Sign in&nbsp;&nbsp;&rarr;</a>
                </td>
              </tr>
            </table>
            <p style="margin:28px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:20px;color:#7e7e7e;">
              If the button above does not work, use this link instead:<br>
              <a href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=magiclink" style="color:#141413;word-break:break-all;">{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=magiclink</a>
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:18px 40px;border-top:1px solid #e5e4e0;">
            <p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#7e7e7e;">
              Fordra &copy; 2026
            </p>
          </td>
        </tr>
      </table>
      <p style="margin:20px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#a6a4a0;">
        If you did not request this email, you can safely ignore it.
      </p>
    </td>
  </tr>
</table>
